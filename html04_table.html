<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="widtd=device-widtd, initial-scale=1.0">
    <title>table 태그</title>
</head>
<body>
    <!-- 표를 만드는 태그 : table, tr, td, td, caption colgroup, col 
        td태그 : 가운데 정렬, 글자 진하게 표시하여 강조한다. 

        colgroup : 컬럼단위 기능을 적용할 수 있다.
        col : 칸을 의미한다.

        caption태그 : 표의 제목을 표시한다.

        ctrl + shift + l : 여러곳을 한번에 바꾸기
    -->
    <table border="1" widtd="500">
        <caption><h2>시간표</h2></caption>
        <colgroup>
            <col/>
            <col style="background-color: aquamarine;"/>
            <col/>
        </colgroup>
        <thead>
        <tr><!-- 첫번째 줄-->
            <th>용도</th>
            <th>중량</th>
            <th>가격</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>첫번째 칸</td>
            <td widtd="200"><img src="../img/2.jpeg" width="100"/></td>
            <td style="color:blue">세번재 칸 세번재 칸 세번재 칸 세번재 칸 세번재 칸 세번재 칸</td>
        </tr>
        <tr style="color:red">
            <td>AA<b>AA</b>A</td>
            <td>
                <ol>
                    <li>Html연습중</li>
                    <li>CSS앞으로 할것</li>
                </ol>
            </td>
            <td>CCCCC</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
